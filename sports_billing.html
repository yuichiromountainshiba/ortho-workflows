<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ortho Sports Billing Tool — Mira Health</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');
  :root{
    --bg:#0f1117;--surface:#181c27;--surface2:#1e2330;--border:#2a3045;
    --accent:#4fffb0;--accent2:#7eb8ff;--warn:#ffb74d;--danger:#ff6b6b;
    --text:#e8eaf0;--muted:#7a8299;--code:#c9d1e8;
    --radius:10px;--cf:33.40;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;
    min-height:100vh;padding:24px 16px 60px;}
  #wrap{max-width:700px;margin:0 auto;}

  /* header */
  .hdr{text-align:center;padding:32px 0 28px;}
  .hdr h1{font-family:'DM Serif Display',serif;font-size:clamp(22px,4vw,32px);
    letter-spacing:-0.5px;color:#fff;line-height:1.15;}
  .hdr .by{font-size:13px;color:var(--accent);font-weight:600;letter-spacing:1.5px;
    text-transform:uppercase;margin:6px 0 4px;}
  .hdr .sub{font-size:13px;color:var(--muted);line-height:1.6;}

  /* category grid */
  .cat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin-bottom:8px;}
  .cat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:18px 16px;cursor:pointer;transition:all .18s ease;position:relative;overflow:hidden;}
  .cat-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--accent)08,transparent);
    opacity:0;transition:opacity .18s;}
  .cat-card:hover{border-color:var(--accent);transform:translateY(-2px);}
  .cat-card:hover::before{opacity:1;}
  .cat-icon{font-size:26px;margin-bottom:8px;}
  .cat-label{font-family:'DM Serif Display',serif;font-size:17px;color:#fff;display:block;margin-bottom:3px;}
  .cat-sub{font-size:11px;color:var(--muted);line-height:1.4;}

  /* progress */
  .prog{display:flex;align-items:center;gap:8px;margin-bottom:18px;font-size:12px;color:var(--muted);}
  .prog .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;}
  .prog .cat-name{color:var(--accent);font-weight:600;letter-spacing:.5px;}

  /* back button */
  .back{background:none;border:1px solid var(--border);color:var(--muted);padding:7px 14px;
    border-radius:6px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;
    transition:all .15s;display:flex;align-items:center;gap:6px;margin-bottom:16px;}
  .back:hover{border-color:var(--accent2);color:var(--accent2);}

  /* question */
  .qlabel{font-family:'DM Serif Display',serif;font-size:19px;color:#fff;
    margin-bottom:10px;line-height:1.35;}
  .qhint{font-size:12px;color:var(--muted);background:var(--surface);border-left:3px solid var(--accent2);
    padding:10px 12px;border-radius:0 6px 6px 0;margin-bottom:14px;line-height:1.6;}
  .grid{display:flex;flex-direction:column;gap:8px;}
  .btn{background:var(--surface);border:1px solid var(--border);color:var(--text);
    padding:13px 16px;border-radius:var(--radius);font-size:14px;cursor:pointer;
    text-align:left;transition:all .15s;font-family:'DM Sans',sans-serif;line-height:1.4;}
  .btn:hover{border-color:var(--accent);color:#fff;background:var(--surface2);}

  /* graft screen */
  .graft-grid{display:flex;flex-direction:column;gap:7px;margin-bottom:14px;}
  .gtog{background:var(--surface);border:1px solid var(--border);color:var(--muted);
    padding:11px 14px;border-radius:8px;font-size:13px;cursor:pointer;text-align:left;
    transition:all .15s;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:10px;}
  .gtog .chk{width:16px;height:16px;border:1.5px solid var(--border);border-radius:4px;
    flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;}
  .gtog.sel{border-color:var(--accent);color:var(--text);background:var(--surface2);}
  .gtog.sel .chk{background:var(--accent);border-color:var(--accent);color:#000;}
  .confirm-btn{background:var(--accent);color:#000;border:none;padding:12px 24px;
    border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;
    font-family:'DM Sans',sans-serif;transition:opacity .15s;width:100%;}
  .confirm-btn:hover{opacity:.88;}

  /* done / results */
  .done-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    overflow:hidden;}
  .done-hdr{background:var(--surface2);padding:16px 20px;border-bottom:1px solid var(--border);
    display:flex;justify-content:space-between;align-items:center;}
  .done-hdr h3{font-family:'DM Serif Display',serif;font-size:18px;color:#fff;}
  .wrvu-badge{background:var(--accent);color:#000;font-size:13px;font-weight:700;
    padding:5px 12px;border-radius:20px;font-family:'DM Mono',monospace;}
  .code-list{padding:16px 20px;}
  .code-row{display:flex;justify-content:space-between;align-items:flex-start;
    padding:10px 0;border-bottom:1px solid var(--border);}
  .code-row:last-child{border-bottom:none;}
  .code-info{flex:1;}
  .code-num{font-family:'DM Mono',monospace;font-size:14px;color:var(--accent2);font-weight:500;}
  .code-desc{font-size:12px;color:var(--muted);margin-top:2px;}
  .code-pay{text-align:right;flex-shrink:0;margin-left:12px;}
  .code-wrvu{font-family:'DM Mono',monospace;font-size:13px;color:var(--text);}
  .code-dollar{font-size:11px;color:var(--muted);margin-top:1px;}
  .ao-tag{font-size:10px;background:#2a3045;color:var(--muted);padding:2px 6px;
    border-radius:4px;margin-left:6px;vertical-align:middle;}

  /* warnings */
  .warns{padding:14px 20px;border-top:1px solid var(--border);}
  .warn-item{background:#261f0e;border:1px solid #4a3a1a;border-radius:7px;
    padding:10px 12px;font-size:12px;color:#e8c97a;margin-bottom:8px;line-height:1.6;}
  .warn-item:last-child{margin-bottom:0;}

  /* op notes */
  .op-notes{padding:14px 20px;border-top:1px solid var(--border);}
  .op-notes h4{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.8px;
    text-transform:uppercase;margin-bottom:10px;}
  .note-item{margin-bottom:10px;}
  .note-code{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent2);margin-bottom:3px;}
  .note-text{font-size:12px;color:var(--muted);line-height:1.6;}

  /* total row */
  .total-row{background:var(--surface2);padding:14px 20px;
    border-top:2px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
  .total-label{font-size:13px;color:var(--muted);}
  .total-val{font-family:'DM Mono',monospace;font-size:20px;color:var(--accent);font-weight:500;}
  .total-dollar{font-size:13px;color:var(--muted);text-align:right;margin-top:2px;}

  /* restart */
  .restart-btn{background:none;border:1px solid var(--border);color:var(--muted);
    padding:10px 20px;border-radius:8px;font-size:13px;cursor:pointer;margin-top:14px;
    font-family:'DM Sans',sans-serif;width:100%;transition:all .15s;}
  .restart-btn:hover{border-color:var(--danger);color:var(--danger);}

  /* warn flag on code row */
  .warn-flag{display:inline-block;width:7px;height:7px;background:var(--warn);
    border-radius:50%;margin-left:6px;vertical-align:middle;}
</style>
</head>

// ── BUNDLING RULES ────────────────────────────────────────────────────────────
// Returns array of bundling warning strings based on current code set
function checkBundling(){
  var codes = S.codes;
  var warnings = [];
  var has = function(c){ return codes.indexOf(''+c) >= 0; };
  var hasAny = function(arr){ return arr.some(function(c){return codes.indexOf(''+c)>=0;}); };

  // Arthroscopy multiple procedure rule - applies to all 29xxx surgical codes
  var scopeCodes = codes.filter(function(c){
    return /^29(8[0-9][0-9]|9[01][0-9])/.test(c) && c !== '29826';
  });
  if(scopeCodes.length > 1){
    warnings.push('Arthroscopy multiple procedure rule: ' + scopeCodes.length + ' arthroscopic procedure codes billed. CMS pays the highest-wRVU code at 100% and each additional at 25% of fee schedule — not 50%. This applies automatically; submit all codes. Ensure documentation supports each additional procedure as distinct and necessary.');
  }

  // 29880 vs 29881: mutually exclusive
  if(has('29880') && has('29881')){
    warnings.push('BUNDLING ERROR: 29880 (medial AND lateral meniscectomy) and 29881 (medial OR lateral) are mutually exclusive — cannot bill both. Use 29880 if both compartments were treated, or 29881 for a single compartment.');
  }
  // 29882 or 29883 same compartment as 29880/29881
  if((has('29882') || has('29883')) && (has('29880') || has('29881'))){
    warnings.push('BUNDLING CAUTION: Meniscectomy (29880/29881) and meniscal repair (29882/29883) billed together. CMS may bundle these if performed on the same compartment. Document that the repair and resection were performed on different compartments (e.g., medial repair + lateral partial meniscectomy). If both procedures were in the same compartment, only the higher-value code is payable.');
  }
  // 29827 (RCR) with 29822/29823 (debridement)
  if(has('29827') && (has('29822') || has('29823'))){
    warnings.push('BUNDLING RISK: 29827 (rotator cuff repair) with 29822/29823 (debridement) billed together. Incidental debridement performed as part of rotator cuff repair approach is bundled into 29827. Only bill debridement separately if a distinct additional chondral or soft tissue debridement was performed at a separate anatomic location with independent clinical significance. High audit risk.');
  }
  // 29870 diagnostic with any surgical arthroscopy
  if(has('29870') && scopeCodes.filter(function(c){return c!=='29870';}).length > 0){
    warnings.push('BUNDLING ERROR: 29870 (diagnostic arthroscopy) cannot be billed when any surgical arthroscopic procedure was performed on the same joint same session. The diagnostic component is included in the surgical procedure. Remove 29870 from the claim.');
  }
  // 29862 debridement with 29914/29915/29916 hip FAI
  if(has('29862') && (has('29914') || has('29915') || has('29916'))){
    warnings.push('BUNDLING CAUTION: 29862 (hip debridement) with FAI decompression or labral repair billed together. Debridement incidental to the FAI procedure is bundled. Only bill 29862 separately if a distinct chondroplasty was performed at a location and extent beyond what is inherent to the FAI decompression or labral repair.');
  }
  // 29805 diagnostic shoulder with any surgical shoulder scope
  var shoScopeSurgical = ['29806','29807','29819','29820','29821','29822','29823','29824','29825','29827','29828'];
  if(has('29805') && hasAny(shoScopeSurgical)){
    warnings.push('BUNDLING ERROR: 29805 (diagnostic shoulder arthroscopy) cannot be billed when a surgical shoulder arthroscopic procedure was performed. The diagnostic component is included in the surgical code. Remove 29805.');
  }
  // 29830 diagnostic elbow with any surgical elbow scope
  var elbScopeSurgical = ['29834','29835','29836','29837','29838'];
  if(has('29830') && hasAny(elbScopeSurgical)){
    warnings.push('BUNDLING ERROR: 29830 (diagnostic elbow arthroscopy) cannot be billed with surgical elbow arthroscopy on the same session. Remove 29830.');
  }
  // 29860 diagnostic hip with any surgical hip scope
  var hipScopeSurgical = ['29861','29862','29863','29914','29915','29916'];
  if(has('29860') && hasAny(hipScopeSurgical)){
    warnings.push('BUNDLING ERROR: 29860 (diagnostic hip arthroscopy) cannot be billed with surgical hip arthroscopy. Remove 29860.');
  }
  // 27447 TKA: do not add individual component codes (note: this is implicit but confirm)
  // 27447 + any open knee ligament repair same session
  var openKnee = ['27405','27407','27409','27427','27428','27429'];
  if(has('27447') && hasAny(openKnee)){
    warnings.push('BUNDLING REVIEW: TKA (27447) billed with an open knee ligament code. These may be separately reportable if a distinct ligament reconstruction was performed outside the arthroplasty, but verify NCCI and document that the ligament procedure was a distinct, medically necessary service separate from the arthroplasty.');
  }
  // 23472 TSA + 23430 biceps tenodesis: TSA includes subscapularis repair, 
  // biceps tenodesis IS separately reportable but check 29828 vs 23430
  if(has('23472') && has('29828')){
    warnings.push('BUNDLING NOTE: RSA/TSA (23472) and arthroscopic biceps tenodesis (29828) — if the tenodesis was performed arthroscopically in the same session as an open arthroplasty, verify payer policy. Some payers bundle 29828 into 23472. Open biceps tenodesis (23430) performed concurrently with TSA is more commonly supported as separately billable.');
  }
  // Multiple ankle ORIF codes — check that 27814 not combined with individual malleolus codes
  if(has('27814') && (has('27766') || has('27792'))){
    warnings.push('BUNDLING ERROR: Bimalleolar fracture code 27814 includes both medial and lateral malleolus fixation. Do not also bill individual malleolus codes (27766, 27792) — they are bundled into 27814.');
  }
  if(has('27822') && (has('27766') || has('27792') || has('27769'))){
    warnings.push('BUNDLING ERROR: Trimalleolar fracture code 27822 includes all three malleoli. Do not add individual malleolus codes (27766, 27769, 27792) — they are bundled into 27822.');
  }
  // 20936 $0 Medicare note
  if(has('20936')){
    warnings.push('PAYMENT NOTE: 20936 (local autograft same incision) carries $0 wRVU under Medicare — no physician payment from Medicare. Submit to commercial payers; many reimburse this code. Include on the claim regardless.');
  }

  return warnings;
}

function renderDone(){
  var codes=S.codes.filter(function(c,i){return S.codes.indexOf(c)===i;});

  // Auto-apply Mod 51 / arthroscopy rule
  // Separate codes into groups by mult indicator
  var m2codes = codes.filter(function(c){return MULT2.has(c);});
  var m3codes = codes.filter(function(c){return MULT3.has(c);});
  var exemptCodes = codes.filter(function(c){return !MULT2.has(c)&&!MULT3.has(c);});

  // For MULT2: sort by wRVU desc. Primary = highest. Rest get Mod 51 (-50%).
  m2codes.sort(function(a,b){return ((DB[b]||{w:0}).w)-((DB[a]||{w:0}).w);});
  // For MULT3 (arthroscopy): sort by wRVU desc. Primary = highest. Rest get 25%.
  m3codes.sort(function(a,b){return ((DB[b]||{w:0}).w)-((DB[a]||{w:0}).w);});

  // Build modifier map: code -> {mod, reduction}
  var modMap = {};
  m2codes.forEach(function(c,i){
    if(i===0) modMap[c]={mod:'',reduction:1.0};
    else modMap[c]={mod:' -51',reduction:0.5};
  });
  m3codes.forEach(function(c,i){
    if(i===0) modMap[c]={mod:'',reduction:1.0};
    else modMap[c]={mod:' -51',reduction:0.25};
  });
  exemptCodes.forEach(function(c){modMap[c]={mod:'',reduction:1.0};});

  // Total weighted: use full wRVU for wRVU display, but show adjusted payment
  var tw=totalW();
  var adjPayment = codes.reduce(function(sum,c){
    var w=(DB[c]||{w:0}).w;
    var r=(modMap[c]||{reduction:1.0}).reduction;
    return sum + w*CF*r;
  },0);
  var rows=codes.map(function(code){
    var db=DB[code]||{d:code,w:0};
    var info=modMap[code]||{mod:'',reduction:1.0};
    var fullPay=(db.w*CF).toFixed(0);
    var adjPay=(db.w*CF*info.reduction).toFixed(0);
    var payDisplay = info.reduction<1.0
      ? '$'+adjPay+' <span style="text-decoration:line-through;color:var(--muted);font-size:10px">$'+fullPay+'</span>'
      : '$'+adjPay;
    var modTag = info.mod ? '<span style="background:#2a1f0a;color:#ffb74d;font-size:10px;padding:2px 5px;border-radius:3px;margin-left:5px">Mod 51'+(info.reduction===0.25?' 25%':' 50%')+'</span>' : '';
    var aoTag=db.ao?'<span class="ao-tag">add-on</span>':'';
    return '<div class="code-row"><div class="code-info"><span class="code-num">'+code+aoTag+modTag+'</span><div class="code-desc">'+db.d+'</div></div><div class="code-pay"><div class="code-wrvu">'+db.w+' wRVU</div><div class="code-dollar">'+payDisplay+'</div></div></div>';
  }).join('');
  var bundleWarnings=checkBundling();
  var allWarns=S.warns.concat(bundleWarnings);
  var warnHtml=allWarns.length?'<div class="warns">'+allWarns.map(function(w){return'<div class="warn-item">'+w+'</div>';}).join('')+'</div>':'';
  var noteCodes=codes.filter(function(c){return OP_NOTES[c];});
  var noteHtml=noteCodes.length?'<div class="op-notes"><h4>Operative note documentation tips</h4>'+noteCodes.map(function(c){return'<div class="note-item"><div class="note-code">'+c+' — '+(DB[c]||{d:c}).d+'</div><div class="note-text">'+OP_NOTES[c]+'</div></div>';}).join('')+'</div>':'';
  return'<div class="done-wrap"><div class="done-hdr"><h3>Billable code set</h3><span class="wrvu-badge">'+tw.toFixed(2)+' total wRVU</span></div><div class="code-list">'+rows+'</div>'+warnHtml+noteHtml+'<div class="total-row"><div><div class="total-label">Total wRVU</div><div class="total-dollar">Est. physician payment (after Mod 51 adjustments)</div></div><div style="text-align:right"><div class="total-val">'+tw.toFixed(2)+'</div><div class="total-dollar">$'+adjPayment.toFixed(0)+'</div></div></div></div><button class="restart-btn" onclick="restart()">Start over</button>';
}

    return'<button class="gtog'+(sel?' sel':'')+'" data-gid="'+g.id+'" onclick="toggleG(\''+g.id+'\')"><span class="chk">'+(sel?'✓':'')+'</span>'+g.label+'</button>';
  }).join('');
  return'<p class="qlabel">Was a graft used? Select all that apply:</p><div class="graft-grid">'+btns+'</div><button class="confirm-btn" onclick="confirmG()">Confirm graft selection</button>';
}

function renderCat(){
  return'<div class="cat-grid">'+CATS.map(function(c){
    return'<div class="cat-card" onclick="selCat(\''+c.id+'\')"><div class="cat-icon">'+c.icon+'</div><span class="cat-label">'+c.label+'</span><div class="cat-sub">'+c.sub+'</div></div>';
  }).join('')+'</div>';
}

function backBtn(){return S.hist.length>0?'<button class="back" onclick="back()">&#8592; Back</button>':'';}
function progLine(){return S.cat?'<div class="prog"><span class="dot"></span><span class="cat-name">'+CAT_NAMES[S.cat]+'</span></div>':'';}

function render(){
  if(S.step==='cat')return renderCat();
  if(S.step==='done')return backBtn()+progLine()+renderDone();
  if(S.step==='graft')return backBtn()+progLine()+renderGraft();
  var fn=STEPS[S.step];
  if(!fn)return'<p style="color:var(--danger)">Unknown step: '+S.step+'</p>';
  return backBtn()+progLine()+fn();
}

function selCat(id){save();S.cat=id;S.codes=[];S.warns=[];S.gsel=[];
  var first={knee:'knee1',sho:'sho1',hip:'hip1',ank:'ank1',elb:'elb1'};
  S.step=first[id];draw();}

function restart(){S=newState();draw();}

function draw(){
  var el=document.getElementById('app');
  if(el)el.innerHTML=render();
}

// ── TAA ──────────────────────────────────────────────────────────────────────
step('ank_arth',function(){return q('Total ankle arthroplasty type?',[
  {label:'TAA implant-preserving/osteoarticular reconstruction (27702)',fn:function(){doC('27702','ank_arth_rev');}},

  {label:'Removal of prior ankle implant only (27704)',fn:function(){save();warn('27704 for implant removal only. If converting to arthrodesis or new implant, code separately with Mod 22.');addC('27704');S.step='done';draw();}},
],'TAA implant costs appear on the FACILITY claim (HCPCS C-codes) — not the surgeon claim. Document deformity correction, implant brand/sizing, fluoroscopic component position, and concurrent procedures. No dedicated revision TAA CPT — use primary code with Mod 22 for revisions.');});

  {label:'Bilateral same session',fn:function(){save();warn('Bilateral TAA: Mod 50 or LT/RT per payer policy.');S.step='done';draw();}},
]);});

]);});

]);});

step('hip_nav',function(){return q('Was computer-assisted navigation or robotic assistance used?',[

  {label:'No — conventional instrumentation',fn:function(){go('done');}},
]);});

step('kn_bilat_q',function(){return q('Was this procedure performed bilaterally?',[

  {label:'Yes — staged bilateral (separate sessions)',fn:function(){save();warn('Staged bilateral (separate days): bill each session independently with RT/LT modifiers. No multiple-procedure reduction applies when performed on separate dates of service.');S.step='done';draw();}},
]);});
