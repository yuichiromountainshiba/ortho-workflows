<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spine Surgery Billing Interview — 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f8f8f6;color:#1a1a1a;padding:1.5rem;min-height:100vh}
#wrap{max-width:700px;margin:0 auto;background:#fff;border-radius:12px;padding:2rem;box-shadow:0 1px 4px rgba(0,0,0,.08)}
h1{font-size:20px;font-weight:600;margin-bottom:4px}
.sub{font-size:14px;color:#666;margin-bottom:1.5rem;line-height:1.5}
.qlabel{font-size:15px;font-weight:600;margin-bottom:4px;line-height:1.5}
.qhint{font-size:12px;color:#888;margin-bottom:10px}
.grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1rem}
.btn{background:#fff;border:1px solid #d0d0d0;border-radius:8px;padding:9px 14px;font-size:13px;color:#1a1a1a;cursor:pointer;line-height:1.4;text-align:left;font-family:inherit;transition:background .1s}
.btn:hover{background:#f2f2f0}
.btn.on{border:2px solid #2563eb;background:#eff6ff;color:#1d4ed8}
.cbtn{background:#fff;border:1px solid #d0d0d0;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:600;color:#1a1a1a;cursor:pointer;margin-top:4px;font-family:inherit}
.cbtn:hover{background:#f2f2f0}
.panel{background:#f8f8f6;border-radius:10px;padding:1rem 1.25rem;margin-top:1rem;margin-bottom:.5rem}
.panel h3{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:5px 0;border-bottom:1px solid #eee}
.row:last-child{border-bottom:none}
.cpt{font-size:13px;font-weight:600;white-space:nowrap;color:#1a1a1a}
.desc{font-size:12px;color:#555;flex:1}
.wrvu{font-size:13px;font-weight:600;color:#2563eb;white-space:nowrap}
.tbar{display:flex;justify-content:space-between;align-items:center;background:#fff;border:1px solid #d0d0d0;border-radius:8px;padding:9px 14px;margin-bottom:.75rem}
.tlabel{font-size:13px;color:#666}
.tval{font-size:18px;font-weight:600;color:#1a1a1a}
.warn{font-size:12px;color:#78350f;background:#fef3c7;border-radius:8px;padding:8px 12px;margin-bottom:6px;line-height:1.5;border-left:3px solid #f59e0b}
.back{font-size:12px;color:#888;background:none;border:none;cursor:pointer;padding:0;margin-bottom:.75rem;text-decoration:underline;font-family:inherit}
.prog{font-size:12px;color:#aaa;margin-bottom:.75rem}
.note{font-size:11px;color:#999;margin-top:1rem;line-height:1.6;border-top:1px solid #eee;padding-top:1rem}
.restart{background:#fff;border:1px solid #d0d0d0;border-radius:8px;padding:6px 14px;font-size:13px;color:#666;cursor:pointer;font-family:inherit}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
@media(max-width:480px){.cat-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="wrap">
<h1>Spine Surgery Billing Interview</h1>
<p class="sub">Answer each question to build your billable CPT code list. 2026 Medicare rates, non-QPP conversion factor $33.40.</p>
<div id="root"></div>
</div>
<script>
const CF=33.40;
const DB={
  22551:{d:'ACDF with discectomy/decompression, single level',w:24.38},
  22552:{d:'ACDF each additional interspace (add-on)',w:6.34,ao:1},
  22554:{d:'ACDF with minimal discectomy, single level',w:17.25},
  22856:{d:'Cervical total disc arthroplasty, single level',w:23.45},
  22858:{d:'Cervical TDA second level (add-on)',w:8.19,ao:1},
  22861:{d:'Revision cervical total disc arthroplasty',w:32.53},
  22845:{d:'Anterior instrumentation 2-3 segments (add-on)',w:11.64,ao:1},
  22849:{d:'Reinsertion of spinal fixation device',w:14.55},
  22852:{d:'Removal of non-segmental instrumentation/plate',w:10.93},
  22853:{d:'Removal of posterior segmental instrumentation',w:12.44},
  22830:{d:'Exploration of spinal fusion, no new fusion',w:10.30},
  22595:{d:'Posterior fusion C1-C2',w:20.12},
  22590:{d:'Craniocervical fusion occiput to C2',w:19.60},
  22600:{d:'Posterior cervical fusion, single interspace',w:16.97},
  22614:{d:'Each additional interspace, posterior fusion (add-on)',w:6.27,ao:1},
  63001:{d:'Cervical laminectomy 1-2 segments',w:17.17},
  63020:{d:'Cervical laminotomy/foraminotomy, single interspace',w:14.54},
  63022:{d:'Each additional interspace, cervical laminotomy (add-on)',w:5.01,ao:1},
  63050:{d:'Cervical laminoplasty 2+ segments',w:19.26},
  63051:{d:'Laminoplasty with posterior bony reconstruction (add-on)',w:4.48,ao:1},
  22326:{d:'Open treatment cervical vertebral fracture, posterior',w:17.20},
  22328:{d:'Each additional fractured vertebra (add-on)',w:5.98,ao:1},
  22840:{d:'Posterior non-segmental instrumentation (add-on)',w:12.21,ao:1},
  22842:{d:'Posterior segmental instrumentation 3-6 segments (add-on)',w:12.25,ao:1},
  22843:{d:'Posterior segmental instrumentation 7-12 segments (add-on)',w:13.10,ao:1},
  22844:{d:'Posterior segmental instrumentation 13+ segments (add-on)',w:16.01,ao:1},
  22558:{d:'Anterior lumbar interbody fusion ALIF/LLIF/XLIF/OLIF, single interspace',w:22.94},
  22585:{d:'Each additional interspace anterior lumbar interbody (add-on)',w:9.22,ao:1},
  22586:{d:'Pre-sacral interbody L5-S1 AxiaLIF with instrumentation',w:27.42},
  22846:{d:'Anterior instrumentation 4-7 segments (add-on)',w:13.14,ao:1},
  22857:{d:'Lumbar total disc arthroplasty, single level',w:26.45},
  22862:{d:'Revision lumbar total disc arthroplasty',w:29.30},
  22556:{d:'Anterior thoracic interbody fusion, single interspace',w:21.12},
  63087:{d:'Vertebral corpectomy anterior thoracic, single segment',w:24.40},
  63088:{d:'Each additional segment thoracic corpectomy (add-on)',w:9.88,ao:1},
  22851:{d:'Intervertebral biomechanical device after corpectomy (add-on)',w:6.55,ao:1},
  63005:{d:'Lumbar laminectomy 1-2 segments',w:16.02},
  63012:{d:'Lumbar laminectomy, spondylolisthesis with CES',w:17.10},
  63017:{d:'Lumbar laminectomy 3+ segments',w:16.90},
  63045:{d:'Thoracic laminectomy, single segment',w:15.80},
  63048:{d:'Each additional segment thoracic laminectomy (add-on)',w:5.18,ao:1},
  63030:{d:'Lumbar microdiscectomy/laminotomy, single interspace',w:13.18},
  63035:{d:'Each additional interspace microdiscectomy (add-on)',w:4.53,ao:1},
  63042:{d:'Revision lumbar microdiscectomy',w:12.60},
  62330:{d:'Percutaneous lumbar decompression with ligamentum flavum removal NEW 2026',w:8.10},
  62331:{d:'Each additional interspace percutaneous decompression (add-on)',w:3.20,ao:1},
  63265:{d:'Laminectomy for extradural tumor, thoracic',w:19.20},
  63267:{d:'Laminectomy for extradural tumor, lumbar',w:19.80},
  22630:{d:'Posterior interbody fusion PLIF/TLIF, single interspace',w:21.54},
  22632:{d:'Each additional interspace posterior interbody fusion (add-on)',w:5.09,ao:1},
  22633:{d:'Combined posterior interbody + posterolateral fusion, single interspace',w:26.13},
  22634:{d:'Each additional interspace combined fusion (add-on)',w:7.76,ao:1},
  22610:{d:'Posterolateral fusion thoracic, single interspace',w:16.85},
  22612:{d:'Posterolateral fusion lumbar, single interspace',w:22.94},
  22210:{d:'Osteotomy posterior cervical, single vertebra',w:28.14},
  22212:{d:'Osteotomy posterior thoracic, single vertebra',w:32.30},
  22214:{d:'Osteotomy posterior lumbar PSO, single vertebra',w:36.04},
  22216:{d:'Each additional vertebra osteotomy (add-on)',w:9.72,ao:1},
  61783:{d:'Stereotactic spinal navigation (add-on)',w:3.66,ao:1},
  20930:{d:'Allograft morselized bone chips (add-on)',w:0.00,ao:1},
  20931:{d:'Allograft structural cortical ring/dowel (add-on)',w:1.76,ao:1},
  20936:{d:'Autograft local same incision — $0 physician pay (add-on)',w:0.00,ao:1},
  20937:{d:'Autograft morselized separate incision ICBG (add-on)',w:2.72,ao:1},
  20938:{d:'Autograft structural separate incision ICBG (add-on)',w:2.94,ao:1},
  20939:{d:'Bone marrow aspiration separate incision (add-on)',w:1.13,ao:1},
  27279:{d:'Arthrodesis SI joint MIS lateral transfixing implant',w:14.83},
  27280:{d:'Arthrodesis SI joint open posterior approach',w:19.08},
  27096:{d:'SI joint injection with imaging guidance',w:1.48},
};
const GRAFTS=[
  {id:'g1',label:'Structural allograft — cortical ring/dowel (+20931)',codes:['20931']},
  {id:'g2',label:'Morselized allograft — bone chips (+20930)',codes:['20930']},
  {id:'g3',label:'Local autograft same incision (+20936, $0 pay)',codes:['20936']},
  {id:'g4',label:'Iliac crest morselized autograft separate incision (+20937)',codes:['20937']},
  {id:'g5',label:'Iliac crest structural autograft separate incision (+20938)',codes:['20938']},
  {id:'g6',label:'Bone marrow aspiration separate needle site (+20939)',codes:['20939']},
  {id:'g0',label:'No bone graft / graft integral to implant',codes:[]},
];
let S={step:'cat',cat:'',codes:[],warns:[],hist:[],gsel:[],graftNext:''};
function clone(o){return JSON.parse(JSON.stringify(o));}
function save(){S.hist.push(clone(S));}
function back(){if(!S.hist.length)return;S=S.hist.pop();draw();}
function addC(id){S.codes.push(''+id);}
function addN(id,n){for(let i=0;i<n;i++)S.codes.push(''+id);}
function remC(id){const i=S.codes.indexOf(''+id);if(i>=0)S.codes.splice(i,1);}
function warn(m){if(!S.warns.includes(m))S.warns.push(m);}
function go(id){save();S.step=id;draw();}
function doC(codes,next){save();if(codes)([].concat(codes)).forEach(c=>addC(c));S.step=next;draw();}
function doN(id,n,next){save();addN(id,n);S.step=next;draw();}
function toggleG(id){
  const btn=document.getElementById('g_'+id);
  const i=S.gsel.indexOf(id);
  if(i>=0){S.gsel.splice(i,1);if(btn)btn.classList.remove('on');}
  else{S.gsel.push(id);if(btn)btn.classList.add('on');}
}
function confirmG(){
  save();
  if(!S.gsel.length)warn('No graft selected.');
  S.gsel.forEach(sid=>{const o=GRAFTS.find(x=>x.id===sid);if(o)o.codes.forEach(c=>addC(c));});
  S.gsel=[];S.step=S.graftNext;draw();
}
function startGraft(next){save();S.step='graft';S.graftNext=next;S.gsel=[];draw();}
function totalW(){return S.codes.reduce((a,id)=>a+((DB[id]||{}).w||0),0);}
const CAT_NAMES={ac:'Anterior cervical',pc:'Posterior cervical',al:'Anterior lumbar',at:'Anterior thoracic',pd:'Posterior TL decompression',pf:'Posterior TL fusion',si:'SI joint fusion'};
function draw(){document.getElementById('root').innerHTML=render();}
function render(){
  if(S.step==='cat')return renderCat();
  if(S.step==='done')return renderDone();
  if(S.step==='graft')return renderGraft();
  const fn=STEPS[S.step];
  if(!fn)return '<p>Unknown step: '+S.step+'</p>';
  const bk=S.hist.length>1?'<button class="back" onclick="back()">← Back</button>':'';
  const prog=S.cat?'<p class="prog">Category: '+CAT_NAMES[S.cat]+'</p>':'';
  return bk+prog+fn()+miniPanel();
}
function miniPanel(){
  if(!S.codes.length&&!S.warns.length)return '';
  const rows=S.codes.map(id=>{const c=DB[id]||{},w=c.w||0;return '<div class="row"><span class="cpt">'+(c.ao?'+':'')+id+'</span><span class="desc">'+(c.d||id)+'</span><span class="wrvu">'+w.toFixed(2)+' wRVU</span></div>';}).join('');
  const ws=S.warns.map(w=>'<div class="warn">'+w+'</div>').join('');
  return (rows?'<div class="panel"><h3>Codes so far</h3>'+rows+'</div>':'')+ws;
}
function renderCat(){
  const cats=[
    {id:'ac',label:'Anterior cervical',sub:'ACDF, disc replacement, adjacent level, revision'},
    {id:'pc',label:'Posterior cervical',sub:'Laminoplasty, fusion, foraminotomy, upper cervical, ORIF'},
    {id:'al',label:'Anterior lumbar',sub:'ALIF, LLIF/XLIF/OLIF, disc replacement'},
    {id:'at',label:'Anterior thoracic',sub:'Thoracic interbody, corpectomy, tumor/fracture'},
    {id:'pd',label:'Posterior TL decompression',sub:'Laminectomy, microdiscectomy, laminotomy, tumor'},
    {id:'pf',label:'Posterior TL fusion',sub:'PLIF/TLIF, deformity/osteotomy, revision, pelvic fixation'},
    {id:'si',label:'SI joint fusion',sub:'MIS lateral, posterior approach, open, revision, injection'},
  ];
  const btns=cats.map(c=>'<button class="btn" onclick="selCat(\''+c.id+'\')"><div style="font-weight:600;margin-bottom:2px">'+c.label+'</div><div style="font-size:12px;color:#888">'+c.sub+'</div></button>').join('');
  return '<p class="qlabel">What surgery was performed?</p><div class="cat-grid">'+btns+'</div>';
}
function selCat(id){save();S.cat=id;S.codes=[];S.warns=[];S.gsel=[];const first={ac:'ac1',pc:'pc1',al:'al1',at:'at1',pd:'pd1',pf:'pf1',si:'si1'};S.step=first[id];draw();}
function renderGraft(){
  const bk=S.hist.length>1?'<button class="back" onclick="back()">← Back</button>':'';
  const prog=S.cat?'<p class="prog">Category: '+CAT_NAMES[S.cat]+'</p>':'';
  const btns=GRAFTS.map(o=>'<button class="btn" id="g_'+o.id+'" onclick="toggleG(\''+o.id+'\')">'+o.label+'</button>').join('');
  return bk+prog+'<p class="qlabel">What bone graft was used?</p><p class="qhint">Select all that apply, then press confirm.</p><div class="grid">'+btns+'</div><button class="cbtn" onclick="confirmG()">Confirm selection &#8594;</button>'+miniPanel();
}
function renderDone(){
  const rows=S.codes.map(id=>{const c=DB[id]||{},w=c.w||0;return '<div class="row"><span class="cpt">'+(c.ao?'+':'')+id+'</span><span class="desc">'+(c.d||id)+'</span><span class="wrvu">'+w.toFixed(2)+' wRVU &nbsp;/ $'+Math.round(w*CF).toLocaleString()+'</span></div>';}).join('');
  const ws=S.warns.map(w=>'<div class="warn">'+w+'</div>').join('');
  const tw=totalW();
  return '<button class="back" onclick="back()">&#8592; Back</button><h1 style="margin-bottom:1rem">Case complete</h1><div class="panel"><h3>Billable code list</h3>'+rows+'</div>'+ws+'<div class="tbar"><span class="tlabel">Total wRVUs</span><span class="tval">'+tw.toFixed(2)+'</span></div><div class="tbar"><span class="tlabel">Estimated Medicare physician payment (non-QPP $33.40/wRVU)</span><span class="tval">$'+Math.round(tw*CF).toLocaleString()+'</span></div><button class="restart" onclick="restart()">Start new case</button><p class="note">2026 CMS PFS non-QPP CF $33.40. Physician facility rate shown. Add-on codes marked +. 0775T is Category III with variable payer coverage. Verify all codes with CMS PFS Lookup Tool for your MAC jurisdiction. This tool does not constitute billing or legal advice.</p>';
}
function restart(){S={step:'cat',cat:'',codes:[],warns:[],hist:[],gsel:[],graftNext:''};draw();}
function q(label,opts,hint){
  const h=hint?'<p class="qhint">'+hint+'</p>':'';
  const btns=opts.map(function(o,i){return '<button class="btn" data-qi="'+i+'">'+o.label+'</button>';}).join('');
  setTimeout(function(){
    const g=document.getElementById('qwrap');
    if(!g)return;
    g.querySelectorAll('button[data-qi]').forEach(function(b){
      b.addEventListener('click',function(){opts[parseInt(b.getAttribute('data-qi'))].fn();});
    });
  },0);
  return '<p class="qlabel">'+label+'</p>'+h+'<div class="grid" id="qwrap">'+btns+'</div>';
}
const STEPS={};
function step(id,fn){STEPS[id]=fn;}
/* ANTERIOR CERVICAL */
step('ac1',function(){return q('What was the primary anterior cervical procedure?',[
  {label:'ACDF with full discectomy and decompression (22551)',fn:function(){doC('22551','ac_levels');}},
  {label:'ACDF with minimal discectomy only (22554)',fn:function(){doC('22554','ac_levels');}},
  {label:'Cervical disc arthroplasty (22856)',fn:function(){doC('22856','ac_cda');}},
  {label:'Revision of prior disc arthroplasty (22861)',fn:function(){doC('22861','ac_inst');}},
  {label:'Adjacent level ACDF — prior hardware in place',fn:function(){go('ac_adj');}},
  {label:'Hardware removal or reinsertion only',fn:function(){go('ac_hw');}},
]);});
step('ac_levels',function(){return q('How many interspaces were fused anteriorly?',[
  {label:'1 level',fn:function(){go('ac_inst');}},
  {label:'2 levels (+22552)',fn:function(){doN('22552',1,'ac_inst');}},
  {label:'3 levels (+22552 x2)',fn:function(){doN('22552',2,'ac_inst');}},
  {label:'4 levels (+22552 x3)',fn:function(){doN('22552',3,'ac_inst');}},
]);});
step('ac_inst',function(){return q('Was anterior instrumentation (cervical plate) applied?',[
  {label:'Yes (+22845)',fn:function(){doC('22845','ac_graft');}},
  {label:'No',fn:function(){startGraft('ac_nav');}},
]);});
step('ac_graft',function(){startGraft('ac_nav');return '';});
step('ac_nav',function(){return q('Was stereotactic navigation used (not fluoroscopy)?',[
  {label:'Yes (+61783)',fn:function(){doC('61783','done');}},
  {label:'No',fn:function(){go('done');}},
]);});
step('ac_cda',function(){return q('Was a second level also treated with arthroplasty?',[
  {label:'No — single level',fn:function(){go('ac_inst');}},
  {label:'Yes — two-level (+22858)',fn:function(){doC('22858','ac_inst');}},
]);});
step('ac_adj',function(){return q('New level adjacent to prior fusion, or redo at same level?',[
  {label:'New level adjacent to prior fusion',fn:function(){go('ac_adj_hw');}},
  {label:'Redo / revision at prior level',fn:function(){go('ac_adj_rev');}},
]);});
step('ac_adj_hw',function(){return q('Does the prior plate need to be removed to access the new level?',[
  {label:'Yes — prior plate removal required (22852)',fn:function(){doC('22852','ac_adj_primary');}},
  {label:'No — new level accessible without removal',fn:function(){go('ac_adj_primary');}},
]);});
step('ac_adj_primary',function(){return q('What procedure at the new adjacent level?',[
  {label:'Full ACDF with discectomy (22551)',fn:function(){doC('22551','ac_adj_levels');}},
  {label:'Minimal discectomy ACDF (22554)',fn:function(){doC('22554','ac_adj_levels');}},
  {label:'Disc arthroplasty (22856)',fn:function(){doC('22856','ac_inst');}},
]);});
step('ac_adj_levels',function(){return q('How many total new interspaces fused this session?',[
  {label:'1 new level',fn:function(){go('ac_inst');}},
  {label:'2 new levels (+22552)',fn:function(){doN('22552',1,'ac_inst');}},
  {label:'3 new levels (+22552 x2)',fn:function(){doN('22552',2,'ac_inst');}},
]);});
step('ac_adj_rev',function(){return q('What was performed at the prior level?',[
  {label:'Hardware removal + redo fusion (22852 + 22551)',fn:function(){save();addC('22852');addC('22551');S.step='ac_adj_rev2';draw();}},
  {label:'Exploration only — no new fusion (22830)',fn:function(){doC('22830','done');}},
]);});
step('ac_adj_rev2',function(){return q('Were additional new levels also addressed?',[
  {label:'No — redo at single level only',fn:function(){go('ac_inst');}},
  {label:'+1 additional level (+22552)',fn:function(){doN('22552',1,'ac_inst');}},
  {label:'+2 additional levels (+22552 x2)',fn:function(){doN('22552',2,'ac_inst');}},
]);});
step('ac_hw',function(){return q('What hardware procedure?',[
  {label:'Removal of anterior plate (22852)',fn:function(){doC('22852','done');}},
  {label:'Reinsertion of fixation device (22849)',fn:function(){doC('22849','done');}},
  {label:'Both removal and reinsertion',fn:function(){save();addC('22852');addC('22849');S.step='done';draw();}},
]);});
/* POSTERIOR CERVICAL */
step('pc1',function(){return q('What was the primary posterior cervical procedure?',[
  {label:'Posterior cervical fusion (with or without laminectomy)',fn:function(){go('pc_level');}},
  {label:'Laminoplasty (open-door or French-door)',fn:function(){doC('63050','pc_laplas');}},
  {label:'Laminectomy only (no fusion)',fn:function(){go('pc_lam');}},
  {label:'Laminotomy / foraminotomy (hemilaminectomy)',fn:function(){doC('63020','pc_foram');}},
  {label:'Upper cervical / occipitocervical (C0-C1-C2)',fn:function(){go('pc_upper');}},
  {label:'ORIF — cervical fracture / dislocation',fn:function(){doC('22326','pc_orif');}},
]);});
step('pc_level',function(){return q('What level(s) were fused?',[
  {label:'Sub-axial cervical C2 and below (22600)',fn:function(){doC('22600','pc_levels');}},
  {label:'C1-C2 only (22595)',fn:function(){doC('22595','pc_inst_c');}},
  {label:'Occiput to C2 (22590)',fn:function(){doC('22590','pc_inst_c');}},
]);});
step('pc_levels',function(){return q('How many interspaces were fused?',[
  {label:'1',fn:function(){go('pc_decomp');}},
  {label:'2 (+22614)',fn:function(){doN('22614',1,'pc_decomp');}},
  {label:'3 (+22614 x2)',fn:function(){doN('22614',2,'pc_decomp');}},
  {label:'4 (+22614 x3)',fn:function(){doN('22614',3,'pc_decomp');}},
  {label:'5+ (+22614 x4)',fn:function(){doN('22614',4,'pc_decomp');}},
]);});
step('pc_decomp',function(){return q('Was a laminectomy performed at a separate level from the fusion?',[
  {label:'Yes — distinct level (63001)',fn:function(){doC('63001','pc_inst_c');}},
  {label:'No',fn:function(){go('pc_inst_c');}},
]);});
step('pc_inst_c',function(){return q('How many vertebral segments does the posterior construct span?',[
  {label:'1 interspace non-segmental (+22840)',fn:function(){doC('22840','pc_graft');}},
  {label:'3-6 segments (+22842)',fn:function(){doC('22842','pc_graft');}},
  {label:'7-12 segments (+22843)',fn:function(){doC('22843','pc_graft');}},
  {label:'13+ segments (+22844)',fn:function(){doC('22844','pc_graft');}},
  {label:'No instrumentation',fn:function(){go('pc_graft');}},
]);});
step('pc_graft',function(){startGraft('done');return '';});
step('pc_laplas',function(){return q('Was laminoplasty performed with implant reconstruction of the posterior arch?',[
  {label:'Yes (+63051)',fn:function(){doC('63051','done');}},
  {label:'No',fn:function(){go('done');}},
]);});
step('pc_lam',function(){return q('Type of cervical laminectomy?',[
  {label:'1-2 segments (63001)',fn:function(){doC('63001','done');}},
