<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spine Surgery Billing Interview — 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f8f8f6;color:#1a1a1a;padding:1.5rem;min-height:100vh}
#wrap{max-width:700px;margin:0 auto;background:#fff;border-radius:12px;padding:2rem;box-shadow:0 1px 4px rgba(0,0,0,.08)}
h1{font-size:20px;font-weight:600;margin-bottom:4px}
.sub{font-size:14px;color:#666;margin-bottom:1.5rem;line-height:1.5}
.qlabel{font-size:15px;font-weight:600;margin-bottom:4px;line-height:1.5}
.qhint{font-size:12px;color:#888;margin-bottom:10px}
.grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1rem}
.btn{background:#fff;border:1px solid #d0d0d0;border-radius:8px;padding:9px 14px;font-size:13px;color:#1a1a1a;cursor:pointer;line-height:1.4;text-align:left;font-family:inherit;transition:background .1s}
.btn:hover{background:#f2f2f0}
.btn.on{border:2px solid #2563eb;background:#eff6ff;color:#1d4ed8}
.cbtn{background:#1a1a1a;border:none;border-radius:8px;padding:9px 20px;font-size:13px;font-weight:600;color:#fff;cursor:pointer;margin-top:4px;font-family:inherit}
.cbtn:hover{background:#333}
.panel{background:#f8f8f6;border-radius:10px;padding:1rem 1.25rem;margin-top:1rem;margin-bottom:.5rem}
.panel h3{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:5px 0;border-bottom:1px solid #eee}
.row:last-child{border-bottom:none}
.cpt{font-size:13px;font-weight:600;white-space:nowrap;color:#1a1a1a;min-width:52px}
.desc{font-size:12px;color:#555;flex:1}
.wrvu{font-size:13px;font-weight:600;color:#2563eb;white-space:nowrap}
.tbar{display:flex;justify-content:space-between;align-items:center;background:#fff;border:1px solid #d0d0d0;border-radius:8px;padding:9px 14px;margin-bottom:.75rem}
.tlabel{font-size:13px;color:#666}
.tval{font-size:18px;font-weight:600;color:#1a1a1a}
.warn{font-size:12px;color:#78350f;background:#fef3c7;border-radius:8px;padding:8px 12px;margin-bottom:6px;line-height:1.5;border-left:3px solid #f59e0b}
.back{font-size:12px;color:#888;background:none;border:none;cursor:pointer;padding:0;margin-bottom:.75rem;text-decoration:underline;font-family:inherit;display:block}
.prog{font-size:12px;color:#aaa;margin-bottom:.75rem}
.note{font-size:11px;color:#999;margin-top:1rem;line-height:1.6;border-top:1px solid #eee;padding-top:1rem}
.restart{background:#fff;border:1px solid #d0d0d0;border-radius:8px;padding:6px 14px;font-size:13px;color:#666;cursor:pointer;font-family:inherit}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
@media(max-width:480px){.cat-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="wrap">
<h1>Spine Surgery Billing Tool</h1>
<p style="font-size:15px;color:#444;margin-bottom:2px;font-weight:500">by Mira Health</p>
<p class="sub">CPT coding and Medicare 2026 wRVU rates with non-QPP conversion factor $33.40<br>Answer each question to build your billable code list.</p>
<div id="root"></div>
</div>
<script>
var CF = 33.40;

var DB = {
  22551:{d:'ACDF with discectomy/decompression, single level',w:24.38},
  22552:{d:'ACDF each additional interspace (add-on)',w:6.34,ao:1},
  22554:{d:'ACDF with minimal discectomy, single level',w:17.25},
  22856:{d:'Cervical total disc arthroplasty, single level',w:23.45},
  22858:{d:'Cervical TDA second level (add-on)',w:8.19,ao:1},
  22861:{d:'Revision cervical total disc arthroplasty',w:32.53},
  22845:{d:'Anterior instrumentation 2-3 segments (add-on)',w:11.64,ao:1},
  22849:{d:'Reinsertion of spinal fixation device',w:18.69},
  22852:{d:'Removal of non-segmental instrumentation / plate',w:9.14},
  22853:{d:'Insertion of interbody biomechanical device (cage/spacer) with integral instrumentation, each interspace (add-on)',w:4.14,ao:1},
  22854:{d:'Insertion of interbody biomechanical device, each additional interspace (add-on to 22853)',w:5.36,ao:1},
  22830:{d:'Exploration of spinal fusion, no new fusion',w:10.94},
  22595:{d:'Posterior fusion C1-C2',w:20.12},
  22590:{d:'Craniocervical fusion occiput to C2',w:21.22},
  22600:{d:'Posterior cervical fusion, single interspace',w:16.97},
  22614:{d:'Each additional interspace posterior fusion (add-on)',w:6.27,ao:1},
  63001:{d:'Cervical laminectomy 1-2 segments',w:17.17},
  63020:{d:'Cervical laminotomy/foraminotomy single interspace',w:14.54},
  // 63022 not in CMS 2026 PFS
  63050:{d:'Cervical laminoplasty 2+ segments',w:21.46},
  63051:{d:'Laminoplasty with posterior bony reconstruction (add-on)',w:24.87,ao:1},
  22326:{d:'Open treatment cervical vertebral fracture posterior',w:20.32},
  22328:{d:'Each additional fractured vertebra (add-on)',w:4.49,ao:1},
  22840:{d:'Posterior non-segmental instrumentation (add-on)',w:12.21,ao:1},
  22842:{d:'Posterior segmental instrumentation 3-6 segments (add-on)',w:12.25,ao:1},
  22843:{d:'Posterior segmental instrumentation 7-12 segments (add-on)',w:13.10,ao:1},
  22844:{d:'Posterior segmental instrumentation 13+ segments (add-on)',w:16.01,ao:1},
  22558:{d:'Anterior lumbar interbody fusion ALIF/LLIF/XLIF/OLIF single interspace',w:22.94},
  22585:{d:'Each additional interspace anterior lumbar interbody (add-on)',w:5.38,ao:1},
  22586:{d:'Pre-sacral interbody L5-S1 AxiaLIF with instrumentation',w:27.42},
  22846:{d:'Anterior instrumentation 4-7 segments (add-on)',w:12.09,ao:1},
  22857:{d:'Lumbar total disc arthroplasty single level',w:26.45},
  22862:{d:'Revision lumbar total disc arthroplasty',w:31.81},
  22556:{d:'Anterior thoracic interbody fusion single interspace',w:24.08},
  63087:{d:'Vertebral corpectomy anterior thoracic single segment',w:36.59},
  63088:{d:'Each additional segment thoracic corpectomy (add-on)',w:4.21,ao:1},
  // 22851 removed from CMS 2026 PFS - cage after corpectomy now billed as 22853
  63005:{d:'Lumbar laminectomy 1-2 segments',w:16.02},
  63012:{d:'Lumbar laminectomy spondylolisthesis with CES',w:16.43},
  63017:{d:'Lumbar laminectomy 3+ segments',w:16.90},
  63046:{d:'Laminectomy with facetectomy and foraminotomy, thoracic, single segment',w:16.82,ao:0},
  63047:{d:'Laminectomy with facetectomy and foraminotomy, lumbar, single segment',w:14.99,ao:0},
  63045:{d:'Laminectomy with facetectomy and foraminotomy, cervical, single segment',w:17.5},
  63048:{d:'Each additional segment thoracic laminectomy (add-on)',w:3.38,ao:1},
  63030:{d:'Lumbar microdiscectomy/laminotomy single interspace',w:11.7},
  63035:{d:'Each additional interspace microdiscectomy (add-on)',w:3.76,ao:1},
  63042:{d:'Revision lumbar microdiscectomy',w:18.29},
  63265:{d:'Laminectomy for extradural tumor thoracic',w:23.22},
  63267:{d:'Laminectomy for extradural tumor lumbar',w:18.96},
  22630:{d:'Posterior interbody fusion PLIF/TLIF single interspace',w:21.54},
  22632:{d:'Each additional interspace posterior interbody fusion (add-on)',w:5.09,ao:1},
  22633:{d:'Combined posterior interbody + posterolateral fusion single interspace',w:26.13},
  22634:{d:'Each additional interspace combined fusion (add-on)',w:7.76,ao:1},
  22610:{d:'Posterolateral fusion thoracic single interspace',w:16.85},
  22612:{d:'Posterolateral fusion lumbar single interspace',w:22.94},
  22210:{d:'Osteotomy posterior cervical single vertebra',w:24.75},
  22212:{d:'Osteotomy posterior thoracic single vertebra',w:20.47},
  22214:{d:'Osteotomy posterior lumbar PSO single vertebra',w:20.49},
  22216:{d:'Each additional vertebra osteotomy (add-on)',w:5.88,ao:1},
  61783:{d:'Stereotactic spinal navigation (add-on)',w:3.66,ao:1},
  20930:{d:'Allograft morselized bone chips (add-on) — $0 Medicare wRVU; submit to commercial payers',w:0.00,ao:1},
  20931:{d:'Allograft structural cortical ring/dowel (add-on)',w:1.76,ao:1},
  20936:{d:'Autograft local same incision (add-on) — $0 Medicare wRVU; submit to commercial payers',w:0.00,ao:1},
  20937:{d:'Autograft morselized separate incision ICBG (add-on)',w:2.72,ao:1},
  20938:{d:'Autograft structural separate incision ICBG (add-on)',w:2.94,ao:1},
  20939:{d:'Bone marrow aspiration separate incision (add-on)',w:1.13,ao:1},
  27279:{d:'Arthrodesis SI joint MIS lateral transfixing implant',w:11.83},
  27280:{d:'Arthrodesis SI joint open posterior approach',w:19.5},
};

var GRAFTS = [
  {id:'g1',label:'Structural allograft — cortical ring/dowel (+20931)',codes:['20931']},
  {id:'g2',label:'Morselized allograft — bone chips (+20930, $0 Medicare / may pay commercial)',codes:['20930']},
  {id:'g3',label:'Local autograft same incision (+20936, $0 Medicare / may pay commercial)',codes:['20936']},
  {id:'g4',label:'Iliac crest morselized autograft separate incision (+20937)',codes:['20937']},
  {id:'g5',label:'Iliac crest structural autograft separate incision (+20938)',codes:['20938']},
  {id:'g6',label:'Bone marrow aspiration separate needle site (+20939)',codes:['20939']},
  {id:'g0',label:'No bone graft / graft integral to implant',codes:[]},
];

// ── State ──────────────────────────────────────────────────────────────────
var S = newState();
function newState(){
  return {step:'cat', cat:'', codes:[], warns:[], hist:[], gsel:[], graftNext:''};
}

function clone(o){ return JSON.parse(JSON.stringify(o)); }

// Save snapshot BEFORE making changes
function save(){ S.hist.push(clone(S)); }

// Back: restore previous snapshot
function back(){
  if(!S.hist.length) return;
  S = S.hist.pop();
  draw();
}

function addC(id){ S.codes.push(''+id); }
function addN(id,n){ for(var i=0;i<n;i++) S.codes.push(''+id); }
function remC(id){ var i=S.codes.indexOf(''+id); if(i>=0) S.codes.splice(i,1); }
function warn(m){ if(!S.warns.includes(m)) S.warns.push(m); }

// go: save then change step, no code changes
function go(id){ save(); S.step=id; draw(); }

// doC: save, optionally add code(s), change step
function doC(codeOrNull, next){
  save();
  if(codeOrNull){
    var arr = Array.isArray(codeOrNull) ? codeOrNull : [codeOrNull];
    arr.forEach(function(c){ addC(c); });
  }
  S.step = next;
  draw();
}

// doN: save, add code n times, change step
function doN(id, n, next){ save(); addN(id,n); S.step=next; draw(); }

// Graft: save, set step to 'graft', store next destination
function goGraft(next){ save(); S.graftNext=next; S.step='graft'; S.gsel=[]; draw(); }

// Toggle graft button — NO re-render, just toggle class on the button
function toggleG(id){
  var btn = document.getElementById('gbtn_'+id);
  var i = S.gsel.indexOf(id);
  if(i >= 0){ S.gsel.splice(i,1); if(btn) btn.classList.remove('on'); }
  else       { S.gsel.push(id);   if(btn) btn.classList.add('on');    }
}

// Confirm graft selection — save before committing
function confirmG(){
  save();
  if(!S.gsel.length) warn('No graft selected — if no graft was used, no graft code is needed.');
  S.gsel.forEach(function(sid){
    var o = GRAFTS.find(function(x){ return x.id===sid; });
    if(o) o.codes.forEach(function(c){ addC(c); });
  });
  S.gsel = [];
  S.step = S.graftNext;
  draw();
}

function totalW(){ return S.codes.reduce(function(a,id){ return a+((DB[id]||{}).w||0); }, 0); }

// ── Rendering ──────────────────────────────────────────────────────────────
function draw(){ document.getElementById('root').innerHTML = render(); }

var CAT_NAMES = {ac:'Anterior cervical',pc:'Posterior cervical',al:'Anterior or lateral lumbar',
  at:'Anterior thoracic',pd:'Posterior TL decompression',pf:'Posterior TL fusion',si:'SI joint fusion'};

function backBtn(){
  // Show back button whenever there is history to go back to
  return S.hist.length > 0 ? '<button class="back" onclick="back()">&#8592; Back</button>' : '';
}

function progLine(){
  return S.cat ? '<p class="prog">Category: '+CAT_NAMES[S.cat]+'</p>' : '';
}

function render(){
  if(S.step === 'cat')   return renderCat();
  if(S.step === 'graft') return renderGraft();
  if(S.step === 'done')  return renderDone();
  var fn = STEPS[S.step];
  if(!fn) return '<p style="color:red">Unknown step: '+S.step+'</p>';
  return backBtn() + progLine() + fn() + miniPanel();
}

function miniPanel(){
  if(!S.codes.length && !S.warns.length) return '';
  var rows = S.codes.map(function(id){
    var c=DB[id]||{}, w=c.w||0;
    return '<div class="row"><span class="cpt">'+(c.ao?'+':'')+id+'</span>'
          +'<span class="desc">'+(c.d||id)+'</span>'
          +'<span class="wrvu">'+w.toFixed(2)+' wRVU</span></div>';
  }).join('');
  var ws = S.warns.map(function(w){ return '<div class="warn">'+w+'</div>'; }).join('');
  return (rows ? '<div class="panel"><h3>Codes so far</h3>'+rows+'</div>' : '') + ws;
}

function renderCat(){
  var cats = [
    {id:'ac',label:'Anterior cervical',sub:'ACDF, disc replacement, adjacent level, revision'},
    {id:'pc',label:'Posterior cervical',sub:'Laminoplasty, fusion, foraminotomy, upper cervical, ORIF'},
    {id:'al',label:'Anterior or lateral lumbar',sub:'ALIF, LLIF/XLIF/OLIF, disc replacement'},
    {id:'at',label:'Anterior thoracic',sub:'Thoracic interbody, corpectomy, tumor/fracture'},
    {id:'pd',label:'Posterior TL decompression',sub:'Laminectomy, microdiscectomy, laminotomy, tumor'},
    {id:'pf',label:'Posterior TL fusion',sub:'PLIF/TLIF, deformity/osteotomy, revision, pelvic fixation'},
    {id:'si',label:'SI joint fusion',sub:'MIS lateral, posterior approach, open, revision, injection'},
  ];
  var btns = cats.map(function(c){
    return '<button class="btn" onclick="selCat(\''+c.id+'\')"><div style="font-weight:600;margin-bottom:2px">'+c.label+'</div>'
          +'<div style="font-size:12px;color:#888">'+c.sub+'</div></button>';
  }).join('');
  return '<p class="qlabel">What surgery was performed?</p><div class="cat-grid">'+btns+'</div>';
}

function selCat(id){
  save();
  S.cat=id; S.codes=[]; S.warns=[]; S.gsel=[];
  var first={ac:'ac1',pc:'pc1',al:'al1',at:'at1',pd:'pd1',pf:'pf1',si:'si1'};
  S.step = first[id];
  draw();
}

function renderGraft(){
  var btns = GRAFTS.map(function(o){
    return '<button class="btn" id="gbtn_'+o.id+'" onclick="toggleG(\''+o.id+'\')">'+o.label+'</button>';
  }).join('');
  return backBtn() + progLine()
    + '<p class="qlabel">What bone graft was used?</p>'
    + '<p class="qhint">Select all that apply, then press confirm.</p>'
    + '<div class="grid">'+btns+'</div>'
    + '<button class="cbtn" onclick="confirmG()">Confirm selection &#8594;</button>'
    + miniPanel();
}

function renderDone(){
  var rows=S.codes.map(function(id){
    var c=DB[id]||{},w=c.w||0;
    return '<div class="row"><span class="cpt">'+(c.ao?'+':'')+id+'</span>'
          +'<span class="desc">'+(c.d||id)+'</span>'
          +'<span class="wrvu">'+w.toFixed(2)+' wRVU / $'+Math.round(w*CF).toLocaleString()+'</span></div>';
  }).join('');
  var ws=S.warns.map(function(w){return '<div class="warn">'+w+'</div>';}).join('');
  var tw=totalW();
  var seen={};var tips=[];
  S.codes.forEach(function(id){
    if(OP_NOTES[id]&&!seen[id]){seen[id]=1;tips.push({id:id,tip:OP_NOTES[id]});}
  });
  var tipHtml='';
  if(tips.length>0){
    var tipRows=tips.map(function(t){
      return '<div style="padding:9px 0;border-bottom:1px solid #eee">'
        +'<div style="font-size:12px;font-weight:600;color:#1a1a1a;margin-bottom:3px">'+t.id+'</div>'
        +'<div style="font-size:12px;color:#444;line-height:1.65">'+t.tip+'</div>'
        +'</div>';
    }).join('');
    tipHtml='<div class="panel" style="margin-top:1rem">'
      +'<h3>Operative note documentation tips</h3>'
      +'<p style="font-size:11px;color:#888;margin-bottom:8px">Key elements to document for each billed code</p>'
      +tipRows+'</div>';
  }
  return backBtn()
    +'<h1 style="margin-bottom:1rem">Case complete</h1>'
    +'<div class="panel"><h3>Billable code list</h3>'+(rows||'<p style="font-size:13px;color:#888">No codes selected.</p>')+'</div>'
    +ws
    +'<div class="tbar"><span class="tlabel">Total wRVUs</span><span class="tval">'+tw.toFixed(2)+'</span></div>'
    +'<div class="tbar"><span class="tlabel">Estimated Medicare physician payment (non-QPP $33.40/wRVU)</span><span class="tval">$'+Math.round(tw*CF).toLocaleString()+'</span></div>'
    +tipHtml
    +'<button class="restart" onclick="restart()" style="margin-top:1rem">Start new case</button>'
    +'<p class="note">2026 CMS PFS non-QPP CF $33.40. Physician facility rate shown. Add-on codes marked +. 0775T is Category III with variable payer coverage. Verify all codes with CMS PFS Lookup Tool for your MAC. Not billing or legal advice.</p>';
}
function restart(){ S = newState(); draw(); }

// ── Question builder ────────────────────────────────────────────────────────
// Uses setTimeout to attach event listeners after innerHTML is set
function q(label, opts, hint){
  var h = hint ? '<p class="qhint">'+hint+'</p>' : '';
  var btns = opts.map(function(o,i){
    return '<button class="btn" data-qi="'+i+'">'+o.label+'</button>';
  }).join('');
  // Attach listeners after render
  setTimeout(function(){
    var wrap = document.getElementById('qwrap');
    if(!wrap) return;
    wrap.querySelectorAll('[data-qi]').forEach(function(b){
      b.addEventListener('click', function(){
        opts[parseInt(b.getAttribute('data-qi'))].fn();
      });
    });
  }, 0);
  return '<p class="qlabel">'+label+'</p>'+h+'<div class="grid" id="qwrap">'+btns+'</div>';
}

var STEPS = {};
function step(id, fn){ STEPS[id] = fn; }

// ══════════════════════════════════════════════════════════════════════════
// ANTERIOR CERVICAL
// ══════════════════════════════════════════════════════════════════════════
step('ac1', function(){ return q('What was the primary anterior cervical procedure?',[
  {label:'ACDF with full discectomy and decompression (22551)', fn:function(){ doC('22551','ac_levels'); }},
  {label:'ACDF with minimal discectomy only (22554)',           fn:function(){ doC('22554','ac_levels'); }},
  {label:'Cervical disc arthroplasty (22856)',                  fn:function(){ doC('22856','ac_cda');   }},
  {label:'Revision of prior disc arthroplasty (22861)',         fn:function(){ doC('22861','ac_inst');  }},
  {label:'Adjacent level ACDF — prior hardware in place',       fn:function(){ go('ac_adj');            }},
  {label:'Hardware removal or reinsertion only',                fn:function(){ go('ac_hw');             }},
]); });

step('ac_levels', function(){ return q('How many interspaces were fused anteriorly?',[
  {label:'1 level',             fn:function(){ go('ac_device');            }},
  {label:'2 levels (+22552)',   fn:function(){ doN('22552',1,'ac_device'); }},
  {label:'3 levels (+22552 x2)',fn:function(){ doN('22552',2,'ac_device'); }},
  {label:'4 levels (+22552 x3)',fn:function(){ doN('22552',3,'ac_inst');   }},
]); });


step('ac_device', function(){ return q('Was a cage, spacer, or interbody biomechanical device placed in the disc space?',[
  {label:'Yes — single interspace (+22853)',           fn:function(){ doC('22853','ac_inst'); }},
  {label:'Yes — 2 interspaces (+22853 +22854)',        fn:function(){ save(); addC('22853'); addC('22854'); S.step='ac_inst'; draw(); }},
  {label:'Yes — 3 interspaces (+22853 +22854 x2)',     fn:function(){ save(); addC('22853'); addN('22854',2); S.step='ac_inst'; draw(); }},
  {label:'Yes — 4 interspaces (+22853 +22854 x3)',     fn:function(){ save(); addC('22853'); addN('22854',3); S.step='ac_inst'; draw(); }},
  {label:'No device — autograft / allograft structural only (no cage)', fn:function(){ go('ac_inst'); }},
],'CPT +22853 covers any interbody biomechanical device (PEEK cage, titanium cage, allograft spacer with integral fixation) placed in the disc space. Do not report +22853 with 22554 (minimal discectomy) unless a true structural device was placed. Structural allograft alone without integral fixation = +20931, not +22853.'); });

step('al_device', function(){ return q('Was a cage, spacer, or interbody biomechanical device placed in the disc space?',[
  {label:'Yes — single interspace (+22853)',           fn:function(){ doC('22853','al_inst_a'); }},
  {label:'Yes — 2 interspaces (+22853 +22854)',        fn:function(){ save(); addC('22853'); addC('22854'); S.step='al_inst_a'; draw(); }},
  {label:'Yes — 3 interspaces (+22853 +22854 x2)',     fn:function(){ save(); addC('22853'); addN('22854',2); S.step='al_inst_a'; draw(); }},
  {label:'No device — structural graft only (use +20931 for structural allograft)', fn:function(){ go('al_inst_a'); }},
],'ALIF, LLIF, XLIF, and OLIF cage/spacer devices = +22853 per interspace. AxiaLIF (22586) includes the device — do not add +22853 to 22586.'); });

step('pf_device', function(){ return q('Was a cage, spacer, or interbody biomechanical device placed in the disc space(s)?',[
  {label:'Yes — single interspace (+22853)',           fn:function(){ doC('22853','pf_inst'); }},
  {label:'Yes — 2 interspaces (+22853 +22854)',        fn:function(){ save(); addC('22853'); addC('22854'); S.step='pf_inst'; draw(); }},
  {label:'Yes — 3 interspaces (+22853 +22854 x2)',     fn:function(){ save(); addC('22853'); addN('22854',2); S.step='pf_inst'; draw(); }},
  {label:'No device placed',                           fn:function(){ go('pf_inst'); }},
],'PLIF and TLIF cages = +22853 per interspace. The laminectomy/discectomy inherent to PLIF/TLIF approach is bundled into 22630/22633 — the cage itself is separately captured by +22853. +22853 is NOT bundled with 22630 or 22633 under NCCI.'); });

step('ac_inst', function(){ return q('Was anterior instrumentation (cervical plate) applied?',[
  {label:'Yes — plate applied (+22845)', fn:function(){ save(); addC('22845'); goGraft('ac_nav'); }},
  {label:'No plate',                     fn:function(){ goGraft('ac_nav'); }},
]); });

// Dedicated step that just launches graft multi-select
// ac_graft_q removed — goGraft called directly

step('ac_nav', function(){ return q('Was stereotactic navigation used (not fluoroscopy)?',[
  {label:'Yes (+61783)', fn:function(){ doC('61783','done'); }},
