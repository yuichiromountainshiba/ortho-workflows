<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spine Clinic AI | Mira Health</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f4ef;
  --ink: #1a1612;
  --ink-mid: #4a4540;
  --ink-light: #9a9088;
  --ink-faint: #e8e3da;
  --red: #c0392b;
  --red-bg: #fdf1f0;
  --green: #16a34a;
  --green-bg: #f0fdf4;
  --physician: #7c3aed;
  --ma: #b45309;
  --bo: #c2410c;
  --app: #0369a1;
  --font-display: 'Playfair Display', serif;
  --font-body: 'Outfit', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--ink);
  font-family: var(--font-body);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  overflow: hidden;
}

/* ── Header ── */
.top-bar {
  width: 100%;
  max-width: 860px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
}

.top-logo {
  font-family: var(--font-body);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.22em;
  color: rgba(255,255,255,0.25);
  text-transform: uppercase;
}

.top-title {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 700;
  color: rgba(255,255,255,0.6);
  font-style: italic;
}

/* ── Progress dots ── */
.progress-wrap {
  display: flex;
  gap: 5px;
  align-items: center;
}

.pdot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  cursor: pointer;
  transition: all 0.3s;
}

.pdot.active {
  background: rgba(255,255,255,0.7);
  transform: scale(1.4);
}

.pdot.seen {
  background: rgba(255,255,255,0.35);
}

/* ── Stage / carousel ── */
.stage {
  width: 100%;
  max-width: 860px;
  position: relative;
  height: 420px;
  perspective: 1200px;
}

/* Cards stack behind active */
.card-wrap {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card {
  position: absolute;
  width: 100%;
  height: 100%;
  background: var(--bg);
  border-radius: 12px;
  display: grid;
  grid-template-columns: 220px 1fr;
  overflow: hidden;
  box-shadow: 0 24px 64px rgba(0,0,0,0.4);
  transform-origin: center bottom;
  will-change: transform, opacity;
  transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1),
              opacity  0.55s cubic-bezier(0.4, 0, 0.2, 1);
}

/* States */
.card[data-state="active"] {
  transform: translateY(0) scale(1) rotateX(0deg);
  opacity: 1;
  z-index: 10;
  pointer-events: all;
}

.card[data-state="next"] {
  transform: translateY(14px) scale(0.97) rotateX(1.5deg);
  opacity: 0.5;
  z-index: 5;
  pointer-events: none;
}

.card[data-state="next2"] {
  transform: translateY(24px) scale(0.94) rotateX(2.5deg);
  opacity: 0.25;
  z-index: 3;
  pointer-events: none;
}

.card[data-state="gone-left"] {
  transform: translateX(-110%) rotateY(12deg) scale(0.9);
  opacity: 0;
  z-index: 2;
  pointer-events: none;
}

.card[data-state="gone-right"] {
  transform: translateX(110%) rotateY(-12deg) scale(0.9);
  opacity: 0;
  z-index: 2;
  pointer-events: none;
}

.card[data-state="hidden"] {
  opacity: 0;
  pointer-events: none;
  z-index: 1;
  transform: translateY(30px) scale(0.92);
}

/* ── Card left panel ── */
.card-left {
  padding: 32px 24px;
  display: flex;
  flex-direction: column;
  background: #f0ebe2;
  border-right: 1px solid var(--ink-faint);
  position: relative;
  overflow: hidden;
}

.card-left::after {
  content: attr(data-num);
  position: absolute;
  bottom: -16px;
  right: -8px;
  font-family: var(--font-display);
  font-size: 120px;
  font-weight: 900;
  color: rgba(0,0,0,0.04);
  line-height: 1;
  pointer-events: none;
  user-select: none;
}

.card-step-num {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.2em;
  color: rgba(0,0,0,0.28);
  text-transform: uppercase;
  margin-bottom: 6px;
}

.card-step-name {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 900;
  line-height: 1.05;
  color: var(--ink);
  margin-bottom: 14px;
}

.card-who {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 11px;
  color: var(--ink-light);
  margin-bottom: 6px;
}

.who-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
}

.card-time {
  display: inline-block;
  font-size: 10px;
  font-weight: 500;
  color: var(--ink-light);
  background: rgba(0,0,0,0.05);
  border-radius: 3px;
  padding: 3px 8px;
  width: fit-content;
  margin-bottom: auto;
}

.card-icon {
  margin-top: auto;
  padding-top: 16px;
}

/* ── Card right panel ── */
.card-right {
  padding: 28px 32px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  justify-content: center;
}

.card-block {
  border-radius: 8px;
  padding: 16px 18px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}

.block-icon {
  flex-shrink: 0;
  margin-top: 2px;
}

.block-label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-bottom: 5px;
  color: rgba(0,0,0,0.3);
}

.block-text {
  font-size: 15px;
  font-weight: 500;
  line-height: 1.45;
  color: var(--ink);
}

.prob-block {
  background: var(--red-bg);
  border: 1px solid rgba(192,57,43,0.14);
}

.sol-block {
  background: var(--green-bg);
  border: 1px solid rgba(22,163,74,0.18);
}

.card-stat {
  display: flex;
  align-items: baseline;
  gap: 10px;
  padding: 11px 18px;
  background: rgba(0,0,0,0.03);
  border-radius: 6px;
  border: 1px solid rgba(0,0,0,0.06);
}

.stat-num {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1;
  flex-shrink: 0;
}

.stat-desc {
  font-size: 12px;
  color: var(--ink-light);
  line-height: 1.35;
}

/* ── Bottom nav ── */
.bottom-nav {
  width: 100%;
  max-width: 860px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 24px;
}

.nav-btn {
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.08em;
  color: rgba(255,255,255,0.4);
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 10px 22px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
}

.nav-btn:hover {
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.8);
  border-color: rgba(255,255,255,0.2);
}

.nav-btn:disabled {
  opacity: 0.2;
  cursor: default;
}

.counter {
  font-family: var(--font-body);
  font-size: 11px;
  color: rgba(255,255,255,0.25);
  letter-spacing: 0.1em;
}

/* Auto-play progress bar */
.autoplay-bar {
  width: 100%;
  max-width: 860px;
  height: 2px;
  background: rgba(255,255,255,0.08);
  border-radius: 1px;
  margin-top: 14px;
  overflow: hidden;
}

.autoplay-fill {
  height: 100%;
  background: rgba(255,255,255,0.25);
  border-radius: 1px;
  width: 0%;
  transition: width linear;
}

/* Pause on hover of card */
.stage:hover .autoplay-fill {
  transition: none !important;
}
</style>
</head>

let current = 0;
let autoTimer = null;
let autoStart = null;
const AUTO_DELAY = 6000;

function buildDots() {
  const wrap = document.getElementById('progressDots');
  wrap.innerHTML = '';
  STEPS.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'pdot' + (i === 0 ? ' active' : '');
    d.onclick = () => goTo(i);
    wrap.appendChild(d);
  });
}

function getState(i) {
  const diff = i - current;
  if (diff === 0) return 'active';
  if (diff === 1) return 'next';
  if (diff === 2) return 'next2';
  if (diff < 0) return 'gone-left';
  return 'hidden';
}

function buildCards() {
  const stage = document.getElementById('stage');
  stage.innerHTML = '';
  STEPS.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.state = getState(i);
    card.dataset.index = i;
    card.innerHTML = `
      <div class="card-left" data-num="${s.num}">
        <div class="card-step-num">STEP ${s.num}</div>
        <div class="card-step-name">${s.name.replace('\n','<br>')}</div>
        <div class="card-who">
          <span class="who-dot" style="background:${s.whoColor}"></span>
          ${s.who}
        </div>
        <div class="card-time">${s.time}</div>
        <div class="card-icon">${s.icon}</div>
      </div>
      <div class="card-right">
        <div class="card-block prob-block">
          <div class="block-icon">
            <svg viewBox="0 0 28 28" width="28" height="28">
              <circle cx="14" cy="14" r="12" fill="rgba(192,57,43,0.1)" stroke="rgba(192,57,43,0.4)" stroke-width="1.5"/>
              <line x1="14" y1="8" x2="14" y2="17" stroke="rgba(192,57,43,0.8)" stroke-width="2.2" stroke-linecap="round"/>
              <circle cx="14" cy="21" r="1.4" fill="rgba(192,57,43,0.8)"/>
            </svg>
          </div>
          <div>
            <div class="block-label">Problem</div>
            <div class="block-text">${s.problem}</div>
          </div>
        </div>
        <div class="card-block sol-block">
          <div class="block-icon">
            <svg viewBox="0 0 28 28" width="28" height="28">
              <circle cx="14" cy="14" r="12" fill="rgba(22,163,74,0.1)" stroke="rgba(22,163,74,0.4)" stroke-width="1.5"/>
              <path d="M9 14l4 4 7-7" stroke="rgba(22,163,74,0.9)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </svg>
          </div>
          <div>
            <div class="block-label">AI Solution</div>
            <div class="block-text">${s.solution}</div>
          </div>
        </div>
        <div class="card-stat">
          <div class="stat-num">${s.stat}</div>
          <div class="stat-desc">${s.statDesc}</div>
        </div>
      </div>
    `;
    stage.appendChild(card);
  });
  updateNav();
}

function goTo(n, dir) {
  if (n === current) return;
  const fromLeft = n > current;
  current = Math.max(0, Math.min(n, STEPS.length - 1));
  document.querySelectorAll('.card').forEach((c, i) => {
    c.dataset.state = getState(i);
  });
  document.querySelectorAll('.pdot').forEach((d, i) => {
    d.classList.toggle('active', i === current);
    d.classList.toggle('seen', i < current);
  });
  updateNav();
  resetAutoplay();
}

function go(dir) {
  const next = current + dir;
  if (next < 0 || next >= STEPS.length) return;
  goTo(next, dir);
}

function updateNav() {
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === STEPS.length - 1;
  document.getElementById('counter').textContent = `${current + 1} / ${STEPS.length}`;
}

// Autoplay
function startAutoplay() {
  clearTimeout(autoTimer);
  const fill = document.getElementById('autoFill');
  fill.style.transition = `width ${AUTO_DELAY}ms linear`;
  fill.style.width = '100%';
  autoTimer = setTimeout(() => {
    if (current < STEPS.length - 1) {
      go(1);
    } else {
      fill.style.transition = 'none';
      fill.style.width = '0%';
    }
  }, AUTO_DELAY);
}

function resetAutoplay() {
  clearTimeout(autoTimer);
  const fill = document.getElementById('autoFill');
  fill.style.transition = 'none';
  fill.style.width = '0%';
  requestAnimationFrame(() => requestAnimationFrame(() => startAutoplay()));
}

// Pause autoplay on hover
document.getElementById('stage').addEventListener('mouseenter', () => {
  clearTimeout(autoTimer);
  document.getElementById('autoFill').style.animationPlayState = 'paused';
});
document.getElementById('stage').addEventListener('mouseleave', () => {
  resetAutoplay();
});

// Keyboard nav
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') go(1);
  if (e.key === 'ArrowLeft')  go(-1);
});

// Init
buildDots();
buildCards();
startAutoplay();
</script>
